<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZJV</title>
    <link rel="icon" type="image/png" href="/zjv-logo.png">
    <link rel="stylesheet" href="/style.css?v=1783868268">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 2rem;
        }
        .downtime-logo {
            width: 180px;
            height: auto;
        }
        .downtime-message {
            font-size: 1.4rem;
            color: var(--color-text);
            text-align: center;
        }
        h2 {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <img class="downtime-logo" src="/zjv-logo.png" alt="ZJV Logo">
    <p class="downtime-message">Die Seite wird zur Zeit überarbeitet.</p>
    <h2>Derweil auf YouTube:</h2>
    <zjv-yt-gallery>
        <zjv-yt-tile ytid="Mb9jUFvy8D8" caption="Judo Club Wetzikon – Liga A 2013" thumb="/downtime/judo-club-wetzikon-liga-a-2013.jpg"></zjv-yt-tile>
        <zjv-yt-tile ytid="qXHXgLDEQEw" caption="Samurai Spirit – Judo" thumb="/downtime/samurai-spirit-judo.jpg"></zjv-yt-tile>
        <zjv-yt-tile ytid="g-LlKrFRcUw" caption="Top 20 Ippons – World Judo Tour 2016" thumb="/downtime/top-20-ippons-world-judo-tour-2016.jpg"></zjv-yt-tile>
        <zjv-yt-tile ytid="ghReN2dsYV0" caption="Judo – Desirée Gabriel"></zjv-yt-tile>
    </zjv-yt-gallery>
    <p style="font-size:0.8rem;color:var(--color-text);text-align:center;max-width:560px;margin-top:-1.5rem;">(Aus technischen und rechtlichen Gründen können wir die obigen Inhalte nicht direkt anbieten.)</p>
    <script src="/js/zjv-yt-gallery.js?v=1783524104"></script>

</html>
