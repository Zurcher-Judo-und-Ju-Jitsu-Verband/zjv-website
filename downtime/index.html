<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZJV</title>
    <link rel="icon" type="image/png" href="/zjv-logo.png">
    <link rel="stylesheet" href="/style.css?v=1783354134">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 2rem;
        }
        .downtime-logo {
            width: 180px;
            height: auto;
        }
        .downtime-message {
            font-size: 1.4rem;
            color: var(--color-text);
            text-align: center;
        }
        .downtime-videos {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            padding: 0 1rem;
        }
        .downtime-videos a {
            display: block;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: box-shadow 0.2s;
        }
        .downtime-videos a:hover {
            box-shadow: 0 6px 18px rgba(0,0,0,0.35);
        }
        .downtime-videos img {
            display: block;
            width: 280px;
            height: auto;
        }
        .video-player {
            width: 100%;
            max-width: 560px;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .video-player-frame {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
        }
        .video-player-frame iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .downtime-videos .caption {
            padding: 0.4rem 0.6rem;
            font-size: 0.85rem;
            color: var(--color-text);
            text-align: center;
            background: #fff;
        }
        h2 {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <img class="downtime-logo" src="/zjv-logo.png" alt="ZJV Logo">
    <p class="downtime-message">Die Seite wird zur Zeit überarbeitet.</p>
    <h2>Derweil auf YouTube:</h2>
    <div class="downtime-videos">
        <a href="https://www.youtube.com/watch?v=Mb9jUFvy8D8" data-ytid="Mb9jUFvy8D8" title="Judo Club Wetzikon Liga A 2013">
            <img src="/downtime/judo-club-wetzikon-liga-a-2013.jpg" alt="Judo Club Wetzikon Liga A 2013">
            <span class="caption">Judo Club Wetzikon – Liga A 2013</span>
        </a>
        <a href="https://www.youtube.com/watch?v=qXHXgLDEQEw" data-ytid="qXHXgLDEQEw" title="Samurai Spirit – Judo">
            <img src="/downtime/samurai-spirit-judo.jpg" alt="Samurai Spirit – Judo">
            <span class="caption">Samurai Spirit – Judo</span>
        </a>
        <a href="https://www.youtube.com/watch?v=g-LlKrFRcUw" data-ytid="g-LlKrFRcUw" title="Top 20 Ippons – World Judo Tour 2016">
            <img src="/downtime/top-20-ippons-world-judo-tour-2016.jpg" alt="Top 20 Ippons – World Judo Tour 2016">
            <span class="caption">Top 20 Ippons – World Judo Tour 2016</span>
        </a>
        <a href="https://www.youtube.com/watch?v=ghReN2dsYV0" data-ytid="ghReN2dsYV0" title="Judo – Desirée Gabriel">
            <img src="https://img.youtube.com/vi/ghReN2dsYV0/hqdefault.jpg" alt="Judo – Desirée Gabriel">
            <span class="caption">Judo – Desirée Gabriel</span>
        </a>
    </div>
    <p style="font-size:0.8rem;color:var(--color-text);text-align:center;max-width:560px;margin-top:-1.5rem;">(Aus technischen und rechtlichen Gründen können wir die obigen Inhalte nicht direkt anbieten.)</p>
    <script>
        var tilesHTML = document.querySelector('.downtime-videos').outerHTML;

        function showPlayer(id, caption) {
            var player = document.createElement('div');
            player.className = 'video-player';
            player.innerHTML =
                '<div class="video-player-frame">'
                + '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1"'
                + ' allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"'
                + ' allowfullscreen></iframe>'
                + '</div>'
                + caption
                + '<a href="#" onclick="history.back();return false;" style="display:block;text-align:center;margin-top:0.5rem;font-size:0.85rem;">← Zurück</a>';
            document.querySelector('.downtime-videos, .video-player').replaceWith(player);
        }

        function showTiles() {
            var tmp = document.createElement('div');
            tmp.innerHTML = tilesHTML;
            var tiles = tmp.firstChild;
            document.querySelector('.downtime-videos, .video-player').replaceWith(tiles);
            attachTileHandlers();
        }

        function attachTileHandlers() {
            document.querySelectorAll('.downtime-videos a[data-ytid]').forEach(function(a) {
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    var id = this.dataset.ytid;
                    var caption = this.querySelector('.caption').outerHTML;
                    history.pushState({ytid: id, caption: caption}, '');
                    showPlayer(id, caption);
                });
            });
        }

        attachTileHandlers();

        window.addEventListener('popstate', function(e) {
            if (e.state && e.state.ytid) {
                showPlayer(e.state.ytid, e.state.caption);
            } else {
                showTiles();
            }
        });
    </script>
</body>
</html>
